  #   Description: API Gateway endpoint URL for dev stage for lambda function
  #   Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/dev/"
  # drawFunction:
  #   Description: Lambda Function ARN
  #   Value: !GetAtt drawFunction.Arn
